<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube ID Extractor</title>
    
    <!-- Liên kết tới manifest riêng -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #ff0000; text-align: center; margin-bottom: 5px; font-size: 1.5rem; }
        .desc { color: #2c3e66; text-align: center; margin-bottom: 15px; font-size: 0.9rem; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Courier New', monospace; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        button { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; min-width: 100px; }
        .btn-extract { background: #ff0000; color: white; }
        .btn-clear { background: #2c3e66; color: white; }
        .btn-copy { background: #2c3e66; color: white; }
        .output-label { font-weight: bold; margin-top: 5px; }
        #output { background: #f8f9fc; border: 1px solid #ccc; border-radius: 8px; padding: 12px; min-height: 100px; white-space: pre-wrap; word-break: break-all; font-family: 'Courier New', monospace; }
        .status { margin-top: 10px; font-size: 0.85rem; color: #555; background: #e9ecef; padding: 8px; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 YouTube ID Extractor</h1>
        <p class="desc">Nhập mỗi link YouTube trên một dòng. ID sẽ hiển thị cách nhau 1 dấu cách.</p>
        
        <label for="input">📝 Danh sách link YouTube:</label>
        <textarea id="input" rows="6" placeholder="https://www.youtube.com/watch?v=abcdEFGHijk
https://youtu.be/abcdEFGHijk
..."></textarea>
        
        <div class="btn-group">
            <button class="btn-extract" onclick="extractIDs()">🔍 Lấy ID</button>
            <button class="btn-clear" onclick="clearAll()">🗑 Xóa toàn bộ</button>
            <button class="btn-copy" onclick="copyIDs()">📋 Sao chép ID</button>
        </div>
        
        <label class="output-label">✅ Các ID (cách nhau 1 dấu cách):</label>
        <div id="output"></div>
        <div id="status" class="status">Sẵn sàng. Dán link YouTube vào ô trên và nhấn 'Lấy ID'.</div>
    </div>

    <script>
        // Service Worker để chạy offline (cần thiết cho PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function extractYouTubeIDs(text) {
            const regex = /(?:v=|\/embed\/|\/v\/|\/shorts\/|youtu\.be\/)([A-Za-z0-9_-]{11})(?:[?&\/]|\n|$)/gm;
            const ids = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                ids.push(match[1]);
            }
            return [...new Set(ids)];
        }

        function extractIDs() {
            const rawText = document.getElementById('input').value.trim();
            const outputDiv = document.getElementById('output');
            const statusDiv = document.getElementById('status');
            
            if (!rawText) {
                alert('Vui lòng nhập ít nhất một link YouTube.');
                statusDiv.textContent = 'Chưa có dữ liệu đầu vào.';
                outputDiv.textContent = '';
                return;
            }
            
            const ids = extractYouTubeIDs(rawText);
            if (ids.length > 0) {
                outputDiv.textContent = ids.join(' ');
                statusDiv.textContent = `✅ Tìm thấy ${ids.length} ID. Đã hiển thị trên một dòng, cách nhau 1 dấu cách.`;
            } else {
                outputDiv.textContent = '❌ Không tìm thấy ID YouTube nào.\nHãy kiểm tra lại định dạng link.';
                statusDiv.textContent = 'Không tìm thấy ID. Link có đúng định dạng YouTube không?';
            }
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
            document.getElementById('status').textContent = "Đã xóa sạch dữ liệu. Nhập link mới và nhấn 'Lấy ID'.";
        }

        function copyIDs() {
            const outputText = document.getElementById('output').textContent.trim();
            if (!outputText || outputText.startsWith('❌')) {
                alert('Không có ID nào để sao chép.');
                return;
            }
            navigator.clipboard.writeText(outputText).then(() => {
                document.getElementById('status').textContent = '📋 Danh sách ID đã được sao chép vào clipboard!';
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = outputText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                document.getElementById('status').textContent = '📋 Danh sách ID đã được sao chép vào clipboard!';
            });
        }
    </script>
</body>
</html>
